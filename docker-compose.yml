services:
  db:
    image: mysql:8.4
    container_name: myglico-semantic-db
    environment:
      MYSQL_DATABASE: myglico
      MYSQL_USER: myglico
      MYSQL_PASSWORD: myglico
      MYSQL_ROOT_PASSWORD: myglico_root
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3307:3306"
    volumes:
      - myglico_semantic_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umyglico -pmyglico --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  importer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myglico-semantic-importer
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYGLICO_DATABASE_URL: "mysql+pymysql://myglico:myglico@db:3306/myglico?charset=utf8mb4"
    command: ["python", "scripts/import_uci_dataset.py", "--skip-docker"]
    volumes:
      - .:/app

volumes:
  myglico_semantic_mysql_data:
